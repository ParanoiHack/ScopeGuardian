title = "Scope-guardian configuration file"

protected_branches = ["main", "master"]
path = "./WebGoat"

[kics]
platform = "Dockerfile"

[grype]
ignore_states = "not-fixed,unknown,wont-fix"
transitive_libraries = false

[opengrep]
exclude = ["tests/**"]
exclude_rule = []

# Optional proxy configuration forwarded to scanner sub-processes (Grype, OpenGrep, Syft, KICS).
# Uncomment and set the values below if the scanners must reach the internet through a proxy.
# [proxy]
# http_proxy  = "http://proxy.company.com:3128"
# https_proxy = "http://proxy.company.com:3128"
# no_proxy    = "localhost,127.0.0.1"
