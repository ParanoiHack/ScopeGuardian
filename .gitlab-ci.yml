# ---------------------------------------------------------------------------
# ScopeGuardian – GitLab CI example
#
# This file shows three typical usage patterns:
#   1. scan-only      – run all scanners, display results, no DefectDojo sync
#   2. scan-and-sync  – run all scanners and upload results to DefectDojo
#   3. security-gate  – same as scan-and-sync but fail the pipeline when
#                       finding counts exceed the configured thresholds
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   DD_URL          – Base URL of your DefectDojo instance
#                     (e.g. https://defectdojo.example.com)
#   DD_ACCESS_TOKEN – DefectDojo API v2 token
#                     (User → API v2 Key inside DefectDojo)
#
# The Docker image bundles ScopeGuardian together with KICS, OpenGrep,
# Grype and Syft so no extra installation step is needed.
# ---------------------------------------------------------------------------

default:
  image: ghcr.io/paranoihack/scopeguardian:latest

variables:
  # Base directory that ScopeGuardian uses to resolve scan paths defined in
  # config.toml.  GitLab clones the repository into CI_PROJECT_DIR, so set
  # SCAN_DIR to the parent directory so that relative paths like "./my-repo"
  # resolve correctly.
  SCAN_DIR: $CI_PROJECT_DIR

# ---------------------------------------------------------------------------
# Stage definitions
# ---------------------------------------------------------------------------
stages:
  - security-scan

# ---------------------------------------------------------------------------
# 1. Scan only (no DefectDojo sync)
#    Useful for a quick local feedback loop on merge requests.
# ---------------------------------------------------------------------------
scan-only:
  stage: security-scan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    SCAN_DIR: $CI_PROJECT_DIR
  script:
    - /opt/ScopeGuardian/bin/ScopeGuardian
        --projectName "$CI_PROJECT_NAME"
        --branch "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
        --filter ACTIVE
        -o $CI_PROJECT_DIR/scopeguardian-findings.json
        $CI_PROJECT_DIR/config.toml
  artifacts:
    name: "scopeguardian-$CI_COMMIT_REF_SLUG"
    when: always
    expire_in: 7 days
    paths:
      - scopeguardian-findings.json

# ---------------------------------------------------------------------------
# 2. Scan and sync to DefectDojo
#    Uploads findings to DefectDojo on every push to the default branch.
# ---------------------------------------------------------------------------
scan-and-sync:
  stage: security-scan
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    SCAN_DIR: $CI_PROJECT_DIR
    # DD_URL and DD_ACCESS_TOKEN must be set as CI/CD variables (masked).
  script:
    - /opt/ScopeGuardian/bin/ScopeGuardian
        --projectName "$CI_PROJECT_NAME"
        --branch "$CI_COMMIT_BRANCH"
        --sync
        --filter ACTIVE
        -o $CI_PROJECT_DIR/scopeguardian-findings.json
        $CI_PROJECT_DIR/config.toml
  artifacts:
    name: "scopeguardian-$CI_COMMIT_REF_SLUG"
    when: always
    expire_in: 30 days
    paths:
      - scopeguardian-findings.json

# ---------------------------------------------------------------------------
# 3. Scan, sync and enforce a security gate
#    Fails the pipeline (exit -1) when active finding counts exceed the
#    configured thresholds.  Adjust the --threshold values to fit your
#    security policy.
# ---------------------------------------------------------------------------
security-gate:
  stage: security-scan
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
  variables:
    SCAN_DIR: $CI_PROJECT_DIR
    # DD_URL and DD_ACCESS_TOKEN must be set as CI/CD variables (masked).
  script:
    - /opt/ScopeGuardian/bin/ScopeGuardian
        --projectName "$CI_PROJECT_NAME"
        --branch "$CI_COMMIT_BRANCH"
        --sync
        --threshold critical=1,high=5
        --filter ACTIVE
        -o $CI_PROJECT_DIR/scopeguardian-findings.json
        $CI_PROJECT_DIR/config.toml
  artifacts:
    name: "scopeguardian-gate-$CI_COMMIT_REF_SLUG"
    when: always
    expire_in: 30 days
    paths:
      - scopeguardian-findings.json
