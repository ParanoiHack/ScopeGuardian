name: CI

on:
  pull_request:
  workflow_call:
    secrets:
      DD_URL:
        required: true
      DD_ACCESS_TOKEN:
        required: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test ./...

  security:
    name: Security
    needs: test
    uses: ./.github/workflows/security.yml
    secrets:
      DD_URL: ${{ secrets.DD_URL }}
      DD_ACCESS_TOKEN: ${{ secrets.DD_ACCESS_TOKEN }}
    permissions:
      contents: read
      packages: read
